<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
{css}
</style>
</head>
<body>
  <div class="card {league_class}">
    <div class="header">
      <div class="player-header-main">
        <div class="player-title-row">
          <div class="player-name-badge">{player_name}</div>
          <span class="header-pill player-tag-pill">{player_tag}</span>
        </div>
        <div class="player-sub">
          <span class="header-pill clan-pill">{clan_badge_html}{clan_name}</span>
          <span class="league-line">{league_icon_html}<span class="league-name">{league}</span></span>
        </div>
      </div>
      <div class="th-box">TH {th}<br>XP {exp}</div>
    </div>

    <div class="layout">
      <div class="left-col">
        {heroes_section}
        {pets_section}
      </div>
      <div class="middle-col">
        {troops_section}
        {siege_section}
      </div>
      <div class="right-col">
        {spells_section}
      </div>
    </div>

    <div class="summary-panel">{summary_html}</div>
  </div>
</body>
</html>
