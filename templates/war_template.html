<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">

<!-- 🔥 This is the magic fix for your font issues -->

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #0f141e;
    font-family: 'Noto Sans', sans-serif;
    color: white;
}
.container {
    width: 1000px;
    height: 750px;
    padding: 20px;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
}

.header {
    display: flex;
    font-size: 32px;
    font-weight: bold;
}

.header .clan {
    flex: 2;
    text-align: left;
}

.header .opponent {
    flex: 1;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.vs {
    flex: 1;
    text-align: center;
    color: #aaa;
}

.player.headers {
    font-weight: bold;
    border-bottom: 2px solid #555;
}

.player {
    display: flex;
    padding: 6px 0;
    border-bottom: 1px solid #333;
}

.players {
    margin-top: 15px;
    flex-grow: 1;
    overflow: hidden;
}

.name {
    flex: 2;
    text-align: left;
}

.attacks {
    flex: 1;
    text-align: center;
}

.stars {
    flex: 1;
    text-align: center;
    color: gold;
}

.footer {
    margin-top: 20px;
    font-size: 20px;
}
</style>

</head>

<body>
<div class="container">

<div class="header">
    <div class="clan">{{CLAN_NAME}}</div>
    <div class="vs">VS</div>
    <div class="opponent">{{OPPONENT_NAME}}</div>
</div>

<div class="player headers">
    <div class="name">Name</div>
    <div class="attacks">Attacks</div>
    <div class="stars">Stars</div>
</div>

<div class="players">
    {{PLAYER_ROWS}}
</div>

<div class="footer">
    Strategy: {{STRATEGY}}<br>
    Win Chance: {{WIN_CHANCE}}%<br>
    MVP: {{MVP}}
</div>

</div>
</body>
</html>
