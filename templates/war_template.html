<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #0f141e;
    font-family: 'Noto Sans', sans-serif;
    color: white;
}

.container {
    width: 1000px;
    height: 750px;
    padding: 30px;
    box-sizing: border-box;
}

/* HEADER */
.header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    margin-bottom: 30px;
}

.clan {
    text-align: left;
    font-size: 28px;
    font-weight: bold;
}

.opponent {
    text-align: right;
    font-size: 28px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.vs {
    text-align: center;
    color: #888;
    font-size: 22px;
}

/* SECTION (like Clash UI rows) */
.section {
    margin-top: 25px;
    text-align: center;
}

.section-title {
    color: #aaa;
    font-size: 18px;
    margin-bottom: 8px;
}

/* numbers row */
.stat-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    font-size: 26px;
    font-weight: bold;
}

.stat.left {
    text-align: right;
    padding-right: 10px;
}

.stat.right {
    text-align: left;
    padding-left: 10px;
}

.stat.center {
    color: #666;
    font-size: 20px;
}

/* bars */
.fill {
    box-shadow: 0 0 6px rgba(255,255,255,0.2);
}
.bar-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    margin-top: 8px;
}

.bar {
    height: 8px;
    background: #2a2f3a;
    border-radius: 10px;
    overflow: hidden;
}

.bar.left .fill {
    background: #6cc070;
    height: 100%;
}

.bar.right .fill {
    background: #e06c6c;
    height: 100%;
}

/* PLAYER TABLE */
.players {
    margin-top: 40px;
}

.player.headers,
.player {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
}

.player.headers {
    font-weight: bold;
    border-bottom: 2px solid #555;
    padding-bottom: 6px;
}

.player {
    padding: 6px 0;
    border-bottom: 1px solid #333;
}

.name {
    text-align: left;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    padding-right: 10px;
}

.attacks {
    text-align: center;
}

.stars {
    text-align: right;
    color: gold;
    padding-left: 10px;
}

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 18px;
    color: #ccc;
}
</style>
</head>

<body>
<div class="container">

<!-- HEADER -->
<div class="header">
    <div class="clan">{{CLAN_NAME}}</div>
    <div class="vs">VS</div>
    <div class="opponent">{{OPPONENT_NAME}}</div>
</div>

<!-- STATS SECTIONS -->

<div class="section">
    <div class="section-title">Stars</div>

    <div class="stat-row">
        <div class="stat left">{{CLAN_STARS}}</div>
        <div class="stat center">★</div>
        <div class="stat right">{{OPPONENT_STARS}}</div>
    </div>

    <div class="bar-row">
        <div class="bar left"><div class="fill" style="width: {{CLAN_STARS_PCT}}%"></div></div>
        <div></div>
        <div class="bar right"><div class="fill" style="width: {{OPPONENT_STARS_PCT}}%"></div></div>
    </div>
</div>

<div class="section">
    <div class="section-title">Destruction</div>

    <div class="stat-row">
        <div class="stat left">{{CLAN_DESTRUCTION}}</div>
        <div class="stat center">%</div>
        <div class="stat right">{{OPPONENT_DESTRUCTION}}</div>
    </div>

    <div class="bar-row">
        <div class="bar left"><div class="fill" style="width: {{CLAN_DESTRUCTION}}%"></div></div>
        <div></div>
        <div class="bar right"><div class="fill" style="width: {{OPPONENT_DESTRUCTION}}%"></div></div>
    </div>
</div>

<div class="section">
    <div class="section-title">Attacks Used</div>

    <div class="stat-row">
        <div class="stat left">{{CLAN_ATTACKS}}</div>
        <div class="stat center">⚔️</div>
        <div class="stat right">{{OPPONENT_ATTACKS}}</div>
    </div>
</div>

<!-- PLAYER TABLE -->
<div class="players">

    <div class="player headers">
        <div class="name">Name</div>
        <div class="attacks">Attacks</div>
        <div class="stars">Stars</div>
    </div>

    {{PLAYER_ROWS}}

</div>

<!-- FOOTER -->
<div class="footer">
    Strategy: {{STRATEGY}}<br>
    Win Chance: {{WIN_CHANCE}}%<br>
    MVP: {{MVP}}
</div>

</div>
</body>
</html>
